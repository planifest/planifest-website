<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 110" width="420" height="110">
  <defs>
    <!-- Sonic blue gradient: bright sky-blue → deep cobalt -->
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#33BBFF"/>
      <stop offset="100%" stop-color="#0044CC"/>
    </linearGradient>
    <!-- Subtle inner glow for icon depth -->
    <radialGradient id="glowGrad" cx="30%" cy="25%" r="65%">
      <stop offset="0%"   stop-color="#66CCFF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0033AA" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ═══════════════════════════════════ -->
  <!--              ICON MARK             -->
  <!-- ═══════════════════════════════════ -->

  <!-- Rounded-square background -->
  <rect x="0" y="5" width="100" height="100" rx="18" fill="url(#iconGrad)"/>
  <!-- Inner glow overlay -->
  <rect x="0" y="5" width="100" height="100" rx="18" fill="url(#glowGrad)"/>

  <!-- Blueprint grid dots (engineering / plan feel) -->
  <g fill="white" opacity="0.14">
    <circle cx="14" cy="22" r="1.5"/><circle cx="29" cy="22" r="1.5"/>
    <circle cx="44" cy="22" r="1.5"/><circle cx="59" cy="22" r="1.5"/>
    <circle cx="74" cy="22" r="1.5"/><circle cx="87" cy="22" r="1.5"/>

    <circle cx="14" cy="37" r="1.5"/><circle cx="29" cy="37" r="1.5"/>
    <circle cx="44" cy="37" r="1.5"/><circle cx="59" cy="37" r="1.5"/>
    <circle cx="74" cy="37" r="1.5"/><circle cx="87" cy="37" r="1.5"/>

    <circle cx="14" cy="52" r="1.5"/><circle cx="29" cy="52" r="1.5"/>
    <circle cx="44" cy="52" r="1.5"/><circle cx="59" cy="52" r="1.5"/>
    <circle cx="74" cy="52" r="1.5"/><circle cx="87" cy="52" r="1.5"/>

    <circle cx="14" cy="67" r="1.5"/><circle cx="29" cy="67" r="1.5"/>
    <circle cx="44" cy="67" r="1.5"/><circle cx="59" cy="67" r="1.5"/>
    <circle cx="74" cy="67" r="1.5"/><circle cx="87" cy="67" r="1.5"/>

    <circle cx="14" cy="82" r="1.5"/><circle cx="29" cy="82" r="1.5"/>
    <circle cx="44" cy="82" r="1.5"/><circle cx="59" cy="82" r="1.5"/>
    <circle cx="74" cy="82" r="1.5"/><circle cx="87" cy="82" r="1.5"/>

    <circle cx="14" cy="97" r="1.5"/><circle cx="29" cy="97" r="1.5"/>
    <circle cx="44" cy="97" r="1.5"/><circle cx="59" cy="97" r="1.5"/>
    <circle cx="74" cy="97" r="1.5"/>
  </g>

  <!-- ── P letterform: blocky geometric (bold framework feel) ── -->
  <!-- Vertical stem: x=19–32, y=24–89 -->
  <rect x="19" y="24" width="13" height="65" rx="2.5" fill="white"/>
  <!-- Top horizontal bar of bowl: x=19–63, y=24–34 -->
  <rect x="19" y="24" width="44" height="10" rx="2.5" fill="white"/>
  <!-- Right vertical of bowl: x=51–63, y=24–65 -->
  <rect x="51" y="24" width="12" height="41" rx="2.5" fill="white"/>
  <!-- Middle horizontal bar (closes bowl): x=19–63, y=55–65 -->
  <rect x="19" y="55" width="44" height="10" rx="2.5" fill="white"/>

  <!-- ── Circuit-node accents at P bowl corners (yellow) ── -->
  <!-- Top-right corner of P bowl -->
  <circle cx="63" cy="24" r="6" fill="#FFE000"/>
  <!-- Bottom-right corner of P bowl -->
  <circle cx="63" cy="65" r="6" fill="#FFE000"/>

  <!-- ── Agent trailing dots (electric cyan — "in motion") ── -->
  <circle cx="79" cy="82" r="5.5" fill="#00E8FF" opacity="0.92"/>
  <circle cx="90" cy="91" r="3.5" fill="#00E8FF" opacity="0.58"/>
  <circle cx="96" cy="99" r="2"   fill="#00E8FF" opacity="0.30"/>

  <!-- ═══════════════════════════════════ -->
  <!--             WORDMARK               -->
  <!-- ═══════════════════════════════════ -->
  <text
    x="118" y="74"
    font-family="'Helvetica Neue', 'Arial Black', Arial, sans-serif"
    font-weight="800"
    font-size="52"
    letter-spacing="-0.8"
  ><tspan fill="#0B1E3D">plan</tspan><tspan fill="#1A90FF">ifest</tspan></text>
</svg>
